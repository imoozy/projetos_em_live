<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste DOM</title>
    <link href="/HTML/site_pro/css/styleDOM.css" rel="stylesheet">
</head>

<body>
    <h1>Teste DOM</h1>

    <section class="first-element">
        <h2>Manipulação de Elementos</h2>
        <p>Este é um parágrafo de teste para o DOM.</p>
        <input type="text" id="nome" placeholder="Digite algo...">
        <button onclick="changeTextButton()">Mudar Texto</button>
        <p id="resultado">Este é um parágrafo de teste para o DOM.</p>
    </section>

    <section class="second-element">
        <h2>Aprovação por Idade</h2>
        <input type="text" id="inputText" placeholder="Digite seu nome">
        <input type="number" id="idade" placeholder="Digite sua idade">
        <button onclick="approvalAge()">OK</button>
        <p id="resultado"></p>
    </section>

    

    <section class="third-element">

        <h2>Placar da corrida</h2>

        
        <p>Primeiro: <span class="corredor"></span></p>
        <p>Segundo: <span class="corredor"></span></p>
        <p>Terceiro: <span class="corredor"></span></p>

        <p>Novo Classificado: <input type="text" id="novo"></p><br>
        <p>Posição: <input type="number" id="posicao" min="1" max="3"></p><br>

        <button onclick="addCorredor()">Adicionar Corredor</button>
    </section>

    <section class="fourth-element">
        <h2>EventListener</h2>

        <button id="btn1">Clique aqui</button>

    </section>


    <button onclick="retorno()" id="btnFinal">Retorne a página anterior</button>

    <script src="/HTML/site_pro/js/script.js"></script>

</body>

</html>
