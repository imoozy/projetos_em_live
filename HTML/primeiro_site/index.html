<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Site Fiap</title>
    <link rel="stylesheet" href="/css/style.css">
    

</head>
<body>
    <header> <!-- Regras de boa conduta no front-end -->
        <h1>Bem-vindo ao meu primeiro site!</h1>
        <p>Este é o meu primeiro site criado com HTML e CSS.</p>
        <!-- <nome da tag> -inserção de tag no conteúdo -->
        
        <!-- Atributo é uma informação extra dentro da tag -->
         <img src="foto.jpg" alt="Praia ao por do sol"> <!-- Atributo src é o caminho da imagem, e alt é o texto alternativo caso a imagem não carregue -->

    </header>
    <main>

    </main>
    <footer>

    </footer>
</body>
</html>

<!-- Ponto-chave

O HTML nasceu para estruturar informação.

Isso explica muito bem por que, até hoje, a função principal do HTML é organizar conteúdo, e não programar comportamentos complexos ou criar visuais sofisticados. -->
